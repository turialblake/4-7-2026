<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR NAME - Premium Name Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: relative;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        .name-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 4rem 3rem;
            max-width: 500px;
            margin: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 25px 45px rgba(0,0,0,0.1),
                0 0 0 1px rgba(255,255,255,0.05),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardSlideIn 1s ease-out;
        }

        @keyframes cardSlideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .name-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 
                0 35px 70px rgba(0,0,0,0.2),
                0 0 0 1px rgba(255,255,255,0.1),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .profile-pic::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(255,255,255,0.3), transparent);
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .profile-pic:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .profile-icon {
            font-size: 5rem;
            color: white;
            z-index: 2;
            position: relative;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .name-display {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #f0f0f0, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            position: relative;
        }

        .name-display::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            border-radius: 2px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #fff; }
            to { box-shadow: 0 0 20px #fff, 0 0 30px #fff; }
        }

        .profession {
            font-size: 1.4rem;
            font-weight: 500;
            color: rgba(255,255,255,0.95);
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .social-btn {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:hover {
            transform: translateY(-8px) scale(1.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .github { background: linear-gradient(135deg, #24292e, #39414a); }
        .linkedin { background: linear-gradient(135deg, #0077b5, #005c91); }
        .twitter { background: linear-gradient(135deg, #1da1f2, #0d8bd9); }
        .email { background: linear-gradient(135deg, #ea4335, #dd191d); }
        .portfolio { background: linear-gradient(135deg, #667eea, #764ba2); }

        .typing-cursor {
            display: inline-block;
            background: linear-gradient(135deg, #fff, transparent);
            width: 3px;
            height: 2rem;
            animation: blink 1s infinite;
            margin-left: 5px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @media (max-width: 576px) {
            .name-card {
                margin: 1rem;
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particle" style="left:10%; width:60px; height:60px; animation-delay:0s;"></div>
    <div class="particle" style="left:20%; width:30px; height:30px; animation-delay:1s;"></div>
    <div class="particle" style="left:80%; width:80px; height:80px; animation-delay:2s;"></div>
    <div class="particle" style="left:90%; width:40px; height:40px; animation-delay:3s;"></div>
    <div class="particle" style="left:60%; width:50px; height:50px; animation-delay:4s;"></div>

    <div class="d-flex justify-content-center align-items-center min-vh-100 p-3">
        <div class="name-card">
            <!-- Profile Picture -->
            <div class="profile-pic">
                <i class="bi bi-person-badge-fill profile-icon"></i>
            </div>

            <!-- Name -->
            <h1 class="name-display mb-0">TURIAL BLAKE ALINGASA</h1>

            <!-- Profession -->
            <div class="profession">
                <i class="bi bi-rocket-takeoff-fill me-2"></i>
                Full Stack Developer
                <span class="typing-cursor"></span>
            </div>

            <!-- Social Links -->
            <div class="social-grid">
                <a href="#" class="social-btn github" title="GitHub" target="_blank">
                    <i class="bi bi-github"></i>
                </a>
                <a href="#" class="social-btn linkedin" title="LinkedIn" target="_blank">
                    <i class="bi bi-linkedin"></i>
                </a>
                <a href="#" class="social-btn twitter" title="Twitter" target="_blank">
                    <i class="bi bi-twitter-x"></i>
                </a>
                <a href="#" class="social-btn email" title="Email" target="_blank">
                    <i class="bi bi-envelope-heart-fill"></i>
                </a>
                <a href="#" class="social-btn portfolio" title="Portfolio" target="_blank">
                    <i class="bi bi-globe2"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Dynamic particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.width = (Math.random() * 50 + 20) + 'px';
            particle.style.height = particle.style.width;
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 7000);
        }

        // Create particles periodically
        setInterval(createParticle, 2000);
    </script>
</body>
</html>
